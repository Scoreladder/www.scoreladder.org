<head>
    <style>
        /* Toggle switch */
.switch {
  position: relative;
  display: inline-block;
  width: 52px;
  height: 28px;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  top:0; left:0; right:0; bottom:0;
  background-color: #555;
  transition: .3s;
  border-radius: 28px;
}

.slider:before {
  position: absolute;
  content: "";
  height: 20px;
  width: 20px;
  left: 4px;
  bottom: 4px;
  background-color: white;
  transition: .3s;
  border-radius: 50%;
}

input:checked + .slider {
  background-color: #4f46e5;
}

input:checked + .slider:before {
  transform: translateX(24px);
}
    </style>
</head>

<body class="darkmode">

<div class="container">

<h1 class="regular-text">Scoreladder Articles</h1>

<div class="subtitle">
    Open knowledge + literature powered by Wikipedia & Project Gutenberg
</div>

<input id="topicInput" placeholder="Enter a topic..." />

<!-- SOURCE SWITCH -->
<div style="display:flex; align-items:center; gap:12px; margin-bottom:10px;">
    
    <span class="regular-text">Wikipedia</span>

    <label class="switch">
        <input type="checkbox" id="sourceSwitch">
        <span class="slider"></span>
    </label>

    <span class="regular-text">Literature</span>

</div>

<div>
    <button id="searchBtn" class="regular-text">Find Article</button>
    <button id="aiBtn" class="regular-text" disabled>Generate SAT Questions</button>
</div>

<div id="result" class="regular-text"></div>
<div id="questions" class="regular-text"></div>

<div class="footer">
    Wikipedia + Project Gutenberg (via Gutendex API)
</div>

</div>

<script src="script.js"></script>

</body>
