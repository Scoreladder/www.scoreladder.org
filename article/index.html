<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scoreladder Articles</title>

<link rel="stylesheet" href="../global.css">
<style>
    :root {
    --base-color: #e4e4e4;
    --primary-color: #b8b8b8;
    --secondary-color: #a9a9a9;
    --text-color: #222222;
}
.darkmode {
    --base-color: #303030;
    --primary-color: #3b3b3b;
    --secondary-color: #5a5a5a;
    --text-color: #e4e4e4;
}

body {
    margin: 0;
    font-family: sans-serif;
    background: var(--base-color);
    color: var(--text-color);
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

h1 {
    margin-bottom: 5px;
}

.subtitle {
    margin-bottom: 20px;
    opacity: 0.8;
}

/* INPUT */
input {
    width: 100%;
    padding: 14px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    margin-bottom: 12px;
}

/* BUTTONS */
button {
    padding: 12px 18px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #4f46e5;
    color: white;
    margin-right: 8px;
}

button:hover {
    background: #6366f1;
}

button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

/* CARD */
.card {
    margin-top: 20px;
    padding: 20px;
    background: var(--secondary-color);
    border-radius: 12px;
}

.title {
    font-size: 24px;
    margin-bottom: 10px;
}

.meta {
    font-size: 14px;
    opacity: 0.9;
    margin-bottom: 10px;
}

.abstract {
    line-height: 1.6;
    white-space: pre-wrap;
}

/* QUESTIONS */
.choice {
    margin-top: 8px;
    padding: 10px;
    border-radius: 8px;
    background: var(--secondary-color, 0.1);
}

.answer {
    margin-top: 10px;
    color: #8ab4ff;
}

/* FOOTER */
.footer {
    margin-top: 30px;
    font-size: 12px;
    opacity: 0.7;
    text-align: center;
}
</style>
</head>

<body class="darkmode">

<div class="container">

<h1>Scoreladder Articles</h1>

<div class="subtitle">
    Wikipedia-powered reading + SAT question generator
</div>

<input id="topicInput" placeholder="Enter a topic (e.g. World War II, Gravity, Shakespeare)" />

<div>
    <button id="searchBtn">Find Article</button>
    <button id="aiBtn" disabled>Generate SAT Questions</button>
</div>

<div id="result"></div>
<div id="questions"></div>

<div class="footer">
    Powered by Wikipedia API
</div>

</div>

<script src="script.js"></script>
<script src="../components/layout.js" defer></script>

<div id="header"></div>
<div id="footer"></div>
</body>
</html>
