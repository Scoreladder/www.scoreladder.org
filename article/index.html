<head>
<style>
/* -------------------------
   DISCORD-STYLE THEME
-------------------------- */

:root {
    --bg: #313338;
    --panel: #2b2d31;
    --panel-2: #1e1f22;
    --text: #dbdee1;
    --muted: #949ba4;
    --accent: #5865f2;
    --border: #1f2124;
}

body {
    margin: 0;
    font-family: "gg sans", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* layout */
.container {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px;
}

/* header */
h1 {
    font-size: 24px;
    margin-bottom: 4px;
}

.subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 20px;
}

/* input */
input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 8px;
    border: none;
    background: var(--panel-2);
    color: var(--text);
    font-size: 15px;
    outline: none;
    margin-bottom: 12px;
}

input::placeholder {
    color: var(--muted);
}

/* buttons */
button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 500;
    margin-right: 8px;
    transition: 0.15s;
}

button:hover {
    background: #4752c4;
}

button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

/* panels (Discord "cards") */
.card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-top: 16px;
}

.title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 8px;
}

.meta {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 12px;
}

.abstract {
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
}

/* choices */
.choice {
    background: var(--panel-2);
    border: 1px solid var(--border);
    padding: 10px;
    border-radius: 8px;
    margin-top: 8px;
    font-size: 14px;
}

.answer {
    margin-top: 10px;
    color: #3ba55d;
    font-size: 13px;
}

/* footer */
.footer {
    margin-top: 30px;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
}

/* toggle */
.switch {
  position: relative;
  display: inline-block;
  width: 46px;
  height: 24px;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  top:0; left:0; right:0; bottom:0;
  background-color: #4e5058;
  transition: .2s;
  border-radius: 999px;
}

.slider:before {
  position: absolute;
  content: "";
  height: 18px;
  width: 18px;
  left: 3px;
  bottom: 3px;
  background-color: white;
  transition: .2s;
  border-radius: 50%;
}

input:checked + .slider {
  background-color: var(--accent);
}

input:checked + .slider:before {
  transform: translateX(22px);
}

/* layout row for switch */
.switch-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    color: var(--muted);
    font-size: 13px;
}
</style>
</head>

<body>

<div class="container">

    <h1>Scoreladder Articles</h1>
    <div class="subtitle">
        Wikipedia + Classic Literature powered reading system
    </div>

    <input id="topicInput" placeholder="Search a topic..." />

    <!-- SWITCH -->
    <div class="switch-row">
        <span>Wikipedia</span>

        <label class="switch">
            <input type="checkbox" id="sourceSwitch">
            <span class="slider"></span>
        </label>

        <span>Literature</span>
    </div>

    <div>
        <button id="searchBtn">Find Article</button>
        <button id="aiBtn" disabled>Generate SAT Questions</button>
    </div>

    <div id="result"></div>
    <div id="questions"></div>

    <div class="footer">
        Built with Wikipedia + Project Gutenberg
    </div>

</div>

<script src="script.js"></script>

</body>
