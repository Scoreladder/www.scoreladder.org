<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scoreladder Articles</title>

<style>
    
:root {
    --base-color: #e4e4e4;
    --primary-color: #b8b8b8;
    --secondary-color: #a9a9a9;
    --text-color: #222222;
}
.darkmode {
    --base-color: #303030;
    --primary-color: #3b3b3b;
    --secondary-color: #5a5a5a;
    --text-color: #e4e4e4;
}
body {
    background-color: var(--base-color);
    font-family: sans-serif;
}

.container {
    max-width: 900px;
    margin: auto;
}

h1 {
    margin-bottom: 6px;
}

.regular-text {
    color: var(--text-color);
}

.subtitle {
    color: var(--text-color);
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 14px;
    font-size: 18px;
    border-radius: 8px;
    border: none;
    margin-bottom: 12px;
    box-sizing: border-box;
}

button {
    padding: 12px 18px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #4f46e5;
    color: var(--base-color);
    margin-right: 8px;
}

button:hover {
    background: #6366f1;
}

button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.card {
    margin-top: 25px;
    padding: 20px;
    background: var(--secondary-color);
    border-radius: 12px;
}

.title {
    font-size: 26px;
    margin-bottom: 10px;
}

.meta {
    color: var(--text-color);
    margin-bottom: 15px;
    line-height: 1.6;
}

.abstract {
    line-height: 1.7;
}

.abstract img {
    max-width: 100%;
    border-radius: 8px;
    margin: 10px 0;
}

.choice {
    margin-top: 8px;
    padding: 10px;
    background: var(--secondary-color);
    border-radius: 8px;
}

.answer {
    margin-top: 10px;
    color: #8ab4ff;
}

.footer {
    margin-top: 40px;
    font-size: 13px;
    color: var(--text-color);
    text-align: center;
}
</style>
</head>

<body class="darkmode">

<div class="container">

<h1 class="regular-text">Scoreladder Articles</h1>

<div class="subtitle">
    Open-access research powered by DOAJ
</div>

<input id="topicInput" placeholder="Enter a topic..." />

<div>
    <button id="searchBtn" class="regular-text">Find Article</button>
    <button id="aiBtn" class="regular-text" disabled>Generate SAT Questions</button>
</div>

<div id="result" class="regular-text"></div>
<div id="questions" class="regular-text"></div>

<div class="footer">
    Articles sourced from DOAJ (Directory of Open Access Journals)
</div>

</div>

<script src="script.js"></script>

</body>
</html>
