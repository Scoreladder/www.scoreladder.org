<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scoreladder Articles</title>

<style>
    body {
        background-color: rgb(228, 228, 228);
        font-family: sans-serif;
    }

.container {
    max-width: 900px;
    margin: auto;
}

h1 {
    margin-bottom: 6px;
}

.subtitle {
    color: #212121;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 14px;
    font-size: 18px;
    border-radius: 8px;
    border: none;
    margin-bottom: 12px;
    box-sizing: border-box;
}

button {
    padding: 12px 18px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #4f46e5;
    color: white;
    margin-right: 8px;
}

button:hover {
    background: #6366f1;
}

button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.card {
    margin-top: 25px;
    padding: 20px;
    background: #1e1e1e;
    border-radius: 12px;
}

.title {
    font-size: 26px;
    margin-bottom: 10px;
}

.meta {
    color: #aaa;
    margin-bottom: 15px;
    line-height: 1.6;
}

.abstract {
    line-height: 1.7;
}

.abstract img {
    max-width: 100%;
    border-radius: 8px;
    margin: 10px 0;
}

.choice {
    margin-top: 8px;
    padding: 10px;
    background: #2a2a2a;
    border-radius: 8px;
}

.answer {
    margin-top: 10px;
    color: #8ab4ff;
}

.footer {
    margin-top: 40px;
    font-size: 13px;
    color: #777;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">

<h1>Scoreladder Articles</h1>

<div class="subtitle">
    Open-access research powered by DOAJ
</div>

<input id="topicInput" placeholder="Enter a topic..." />

<div>
    <button id="searchBtn">Find Article</button>
    <button id="aiBtn" disabled>Generate SAT Questions</button>
</div>

<div id="result"></div>
<div id="questions"></div>

<div class="footer">
    Articles sourced from DOAJ (Directory of Open Access Journals)
</div>

</div>

<script src="script.js"></script>

</body>
</html>
