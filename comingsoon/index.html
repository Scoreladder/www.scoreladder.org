<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scoreladder Privacy Policy</title>
<link rel="stylesheet" href="../global.css">
<style>
:root {
    --bg: #e4e4e4;
    --card: #b8b8b8;
    --border: #30363d;
    --text: #222222;
    --muted: #575757;
    --accent: #1070de;
}
.darkmode {
    --bg: #303030;
    --card: #5a5a5a;
    --border: #3b3b3b;
    --text: #e4e4e4;
    --muted: #a7a7a7;
    --accent: #1070de;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Inter, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
}

.container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px;
}

.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
}

h1 {
    margin-top: 0;
    font-size: 2.5rem;
}

h2 {
    color: var(--accent);
}

p {
    color: var(--text);
}

ul {
    padding-left: 20px;
}

li {
    margin-bottom: 8px;
}

.updated {
    color: var(--muted);
    margin-bottom: 30px;
}

a {
    color: var(--accent);
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

.footer {
    padding-top: 20px;
    border-top: 1px solid var(--border);
    color: var(--muted);
}

@media (max-width: 768px) {
    .card {
        padding: 20px;
    }

    h1 {
        font-size: 2rem;
    }
}
</style>
</head>
<body>
<div class="container">
    <div class="card">
      <h2>This page is currently under construction.</h2>
    </div>
</div>


<div id="header"></div>
<div id="footer"></div>
<script src="../components/layout.js" defer></script>


</body>
</html>
