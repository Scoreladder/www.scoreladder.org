<style>
:root {
    --base-color: #e4e4e4;
    --primary-color: #b8b8b8;
    --secondary-color: #a9a9a9;
    --text-color: #222222;
}
.darkmode {
    --base-color: #303030;
    --primary-color: #3b3b3b;
    --secondary-color: #5a5a5a;
    --text-color: #e4e4e4;
}
#topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: var(--primary-color);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
  z-index: 999;
  font-family: Arial;
}

#topbar .left {
  display: flex;
  align-items: center;
  gap: 10px;
}

#topbar .logo {
  height: 34px;
  cursor: pointer;
}

#topbar .center a {
  margin: 0 10px;
  color: var(--text-color);
  text-decoration: none;
  opacity: 0.85;
}

#topbar .right {
  display: flex;
  align-items: center;
  gap: 10px;
}

#topbar button {
  background: var(--secondary-color);
  color: var(--text-color);
  border: none;
  padding: 6px 10px;
  border-radius: 8px;
  cursor: pointer;
}

#topbar .avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  cursor: pointer;
}
</style>

<div id="topbar">
  <div class="left">    
    <a href="/" aria-label="Go to homepage">
      <img id="logo" class="logo" src="/assets/logo.png" alt="Scoreladder">
    </a>
  </div>

  <div class="center">
    <a href="/comingsoon/">Play</a>
    <a href="/comingsoon/">Leaderboards</a>
    <a href="/rules/">Rules</a>
    <a href="/comingsoon/">Wiki</a>
    <a href="/privacy/">Privacy Policy</a>
  </div>

  <div class="right">
    <button id="darkmode-toggle">🌙</button>

    <img id="profileBtn"
         class="avatar hidden"
         onclick="location.href='../profile/'">

    <button id="loginBtn" onclick="location.href='../login/'">
      Log in
    </button>
  </div>
</div>
