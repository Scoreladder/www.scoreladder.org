<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <link rel="stylesheet" href="https://web.scoreladder.org/global.css">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f12;
      color: white;
      padding-top: 60px;
      padding-bottom: 50px;
    }

    .box {
      background: #1a1a22;
      padding: 20px;
      border-radius: 12px;
      width: 320px;
    }

    img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .settings {
      background: #444;
      color: white;
    }

    .logout {
      background: #ff4d4d;
      color: white;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Profile</h2>

  <img id="avatar" />
  <h3 id="name"></h3>
  <p id="id"></p>

  <button class="settings" onclick="goSettings()">Settings</button>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<script>
const API = "https://auth.scoreladder.org";

async function load() {
  const res = await fetch(API + "/me", { credentials: "include" });

  if (!res.ok) {
    location.href = "/";
    return;
  }

  const user = await res.json();

  document.getElementById("name").innerText =
    user.display_name || user.username;

  document.getElementById("id").innerText = user.id;

  document.getElementById("avatar").src =
    user.avatar
      ? `https://cdn.discordapp.com/avatars/${user.id.replace("discord_", "")}/${user.avatar}.png`
      : "https://cdn.discordapp.com/embed/avatars/0.png";
}

function goSettings() {
  location.href = "/settings";
}

async function logout() {
  await fetch(API + "/logout", { credentials: "include" });
  location.href = "/";
}

load();
</script>
<script src="/components/layout.js" defer></script>

<div id="header"></div>
<div id="footer"></div>
</body>
</html>
